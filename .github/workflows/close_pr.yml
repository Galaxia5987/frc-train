name: Close PR
on:
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["Build, tests, formatting"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read

jobs:
  close-if-approve:
    runs-on: ubuntu-latest
    env:
      PARENT_REPO: "Galaxia5987/frc-train"
      
    steps:
      - name: Exit if Parent Repo
        if: github.repository == env.PARENT_REPO
        run: |
            echo "Error: This is the parent repository. Stopping workflow."
            exit 1
            
      - name: Evaluate and Close PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            PR_NUMBER="${{ github.event.workflow_run.pull_requests && github.event.workflow_run.pull_requests[0].number || '' }}"
          fi

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" == "null" ]; then
            echo "Could not determine PR number. Skipping."
            exit 0
          fi

          echo "Checking PR #$PR_NUMBER..."

          APPROVER=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews --jq '.[] | select(.state=="APPROVED") | .user.login' | head -n 1)

          if [ -z "$APPROVER" ]; then
            echo "PR #$PR_NUMBER does not have an 'APPROVED' review yet. Exiting."
            exit 0
          fi

          REPO_OWNER="${{ github.repository_owner }}"
          echo "Approval found from: $APPROVER"

          if [ "$APPROVER" != "$REPO_OWNER" ]; then
            echo "Checking for mutual connection between $APPROVER and $REPO_OWNER..."
            MUTUAL_CONNECTION=false

            if gh api /users/$REPO_OWNER/following/$APPROVER --silent 2>/dev/null && \
               gh api /users/$APPROVER/following/$REPO_OWNER --silent 2>/dev/null; then
              echo "Mutual follow detected."
              MUTUAL_CONNECTION=true
            else
              OWNER_ORGS=$(gh api users/$REPO_OWNER/orgs --jq '.[].login')
              APPROVER_ORGS=$(gh api users/$APPROVER/orgs --jq '.[].login')
              
              SHARED_ORGS=""
              for org in $OWNER_ORGS; do
                if echo "$APPROVER_ORGS" | grep -w -q "$org"; then
                  SHARED_ORGS="$SHARED_ORGS $org"
                fi
              done

              if [ -n "$SHARED_ORGS" ]; then
                echo "Shared organization(s) detected:$SHARED_ORGS"
                MUTUAL_CONNECTION=true
              fi
            fi

            # If neither condition is met, exit the script.
            if [ "$MUTUAL_CONNECTION" = false ]; then
              echo "No mutual connection found between $APPROVER and $REPO_OWNER. Exiting."
              exit 0
            fi
          else
            echo "Approver is the repository owner. Proceeding."
          fi

          echo "Connection verified! Checking CI status..."

          # 4. Check CI Status and Close
          if gh pr checks $PR_NUMBER -R ${{ github.repository }}; then
            echo "All checks are passing! Closing the PR without merging."
            
            gh pr close $PR_NUMBER -R ${{ github.repository }} \
              --comment "Congratulations! You completed this task successfully."
          else
            echo "CI checks are still pending or failing. Waiting for them to pass."
            exit 0
          fi