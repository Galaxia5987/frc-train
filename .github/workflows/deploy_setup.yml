name: Deploy Setup Lambda on AWS

on:
  push:
    branches: 
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read  # Required to check out the repository
    if: github.repository == 'Galaxia5987/frc-train'
    steps:
      - name: Verify Secret is Loaded
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "❌ ERROR: The AWS_ROLE_ARN secret is empty!"
            exit 1
          else
            echo "✅ Secret is populated."
          fi

      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          
      - name: Build Deployment Package
        run: |
          cd setup
          mkdir -p setup
          
          uv pip compile pyproject.toml -o requirements.txt
          
          uv pip install --system \
            --target ./setup \
            --python-platform manylinux2014_x86_64 \
            -r requirements.txt
            
          cp *.py ./setup/
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
      
      - name: Deploy Lambda Function
        run: |
          cd setup/setup
          zip -r ../function.zip .
          cd ..
          
          aws lambda update-function-code \
            --function-name frc-train-setup \
            --zip-file fileb://function.zip